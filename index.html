<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminDashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <div class="dashboard-container">
        <div class="header"></div>
        <div class="main-content"></div>
        <div class="sidebar">
         <div class="side-Dash">
            <span class="mdi mdi-view-dashboard"></span>
            <span>Dashboard</span></div>
         <div class="side_el">
            <span class="mdi mdi-home-outline"></span>
            <span>Home</span>
         </div>
         <div class="side_el">
            <span class="mdi mdi-account-circle-outline"></span>
            <span>Profile</span></div>
         <div class="side_el">
            <span class="mdi mdi-message-outline"></span>
            <span>Messages</span></div>
         <div class="side_el">
            <span class="mdi mdi-history"></span>
            <span>History</span></div>
         <div class="side_el">
            <span class="mdi mdi-file-outline"></span>
            <span>Tasks</span></div>
         <div class="side_el">
             <span class="mdi mdi-account-group-outline"></span>
             <span>Community</span></div>
         <div class="side_el">
            <span class="mdi mdi-cog"></span>
            <span>Settings</span></div>
         <div class="side_el">
           <span class="mdi mdi-help"></span>
           <span>Support</span></div>
         <div class="side_el">
            <span class="mdi mdi-shield-account-outline"></span>
            <span>Privacy</span></div>
        </div> 
          
         
    </div>
</body>
</html>
